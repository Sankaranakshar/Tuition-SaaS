name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Firestore rules tests (RBAC constitution)
        run: npx firebase-tools emulators:exec --only firestore --project classstackr-rules-test "npx vitest run --config vitest.rules.config.ts"

      - name: Build
        run: npm run build
